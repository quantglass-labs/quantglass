line-length = 100
target-version = "py311"
extend-exclude = ["mock", "docs"]

[lint]
select = ["E4", "E7", "E9", "F", "I", "B", "UP"]
ignore = [
  # zip(strict=...) requires touching hot indicator loops; revisit separately.
  "B905",
]

[lint.isort]
known-first-party = ["app"]
