name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  backend:
    name: Backend
    # Cost guard: never consume paid/metered Actions minutes on private repos.
    # Public repos get unlimited free minutes, so CI activates at launch.
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install extension SDK
        run: python -m pip install -e packages/quantglass-sdk
      - name: Install backend
        run: python -m pip install -e "apps/backend[dev,package]"
      - name: Ruff lint
        run: ruff check apps/backend packages/quantglass-sdk extensions scripts
      - name: Ruff format check
        run: ruff format --check apps/backend packages/quantglass-sdk extensions scripts
      - name: Backend tests
        run: PYTHONPATH=apps/backend python -m pytest apps/backend/tests
      - name: Backend import check
        run: PYTHONPATH=apps/backend python -c "from app.main import app; print(app.title, len(app.routes))"
      - name: OpenAPI export
        run: PYTHONPATH=apps/backend python apps/backend/scripts/export_openapi.py

  desktop:
    name: Desktop
    # Cost guard: never consume paid/metered Actions minutes on private repos.
    # Public repos get unlimited free minutes, so CI activates at launch.
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Install desktop dependencies
        run: npm --prefix apps/desktop ci
      - name: ESLint
        run: npm --prefix apps/desktop run lint
      - name: Prettier check
        run: npm --prefix apps/desktop run format:check
      - name: Unit tests
        run: npm --prefix apps/desktop run test
      - name: Desktop build
        run: npm run desktop:build
      - name: NPM audit
        run: npm --prefix apps/desktop audit --audit-level=moderate

  tauri:
    name: Tauri shell
    # Cost guard: never consume paid/metered Actions minutes on private repos.
    # Public repos get unlimited free minutes, so CI activates at launch.
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: Install desktop dependencies
        run: npm --prefix apps/desktop ci
      - name: Rustfmt check
        working-directory: apps/desktop/src-tauri
        run: cargo fmt --check
      - name: Clippy
        working-directory: apps/desktop/src-tauri
        run: cargo clippy -- -D warnings
      - name: Compile Tauri shell
        working-directory: apps/desktop/src-tauri
        run: cargo test

  license-reports:
    name: License reports
    # Cost guard: never consume paid/metered Actions minutes on private repos.
    # Public repos get unlimited free minutes, so CI activates at launch.
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install extension SDK
        run: python -m pip install -e packages/quantglass-sdk
      - name: Install backend
        run: python -m pip install -e "apps/backend[dev,package]"
      - name: Install desktop dependencies
        run: npm --prefix apps/desktop ci
      - name: Generate reports
        run: python scripts/generate_license_reports.py
      - uses: actions/upload-artifact@v4
        with:
          name: license-reports
          path: license-reports/
