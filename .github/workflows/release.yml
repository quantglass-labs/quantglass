name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bundle-glob: |
              apps/desktop/src-tauri/target/release/bundle/deb/*.deb
              apps/desktop/src-tauri/target/release/bundle/rpm/*.rpm
              apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          - os: windows-latest
            bundle-glob: |
              apps/desktop/src-tauri/target/release/bundle/msi/*.msi
              apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          - os: macos-latest
            bundle-glob: |
              apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: Install backend
        run: python -m pip install -e "apps/backend[dev,package]"
      - name: Backend tests
        run: python -m pytest apps/backend/tests
        env:
          PYTHONPATH: apps/backend
      - name: Build backend sidecar
        run: python apps/backend/scripts/build_sidecar.py
      - name: Install desktop dependencies
        run: npm --prefix apps/desktop ci
      - name: Build Tauri bundles
        run: npm --prefix apps/desktop run tauri:build
      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          shopt -s nullglob
          while IFS= read -r pattern; do
            [ -z "$pattern" ] && continue
            for file in $pattern; do
              cp "$file" release-artifacts/
            done
          done <<< "${{ matrix.bundle-glob }}"
          cd release-artifacts
          if command -v sha256sum >/dev/null; then
            sha256sum * > "SHA256SUMS-${{ runner.os }}.txt"
          else
            shasum -a 256 * > "SHA256SUMS-${{ runner.os }}.txt"
          fi
          ls -la
      - uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.os }}
          path: release-artifacts/

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true
          body: |
            Installers are unsigned community-preview builds. Verify downloads
            against the attached SHA256SUMS files. QuantGlass is research and
            decision-support software, not financial advice — see DISCLAIMER.md.
            Paper trading is the supported execution path.
