#
# QuantGlass self-host / server mode. Run the engine + web UI on one port:
#   docker compose up --build
# then open http://localhost:8000. Data persists in the named volume.
# Paper trading only; educational/research software, not financial advice.

services:
  quantglass:
    build:
      context: .
      dockerfile: Dockerfile
    image: quantglass:local
    container_name: quantglass
    ports:
      # Published to host loopback only — reachable from this machine's browser,
      # never the LAN. To expose it beyond localhost (home server, VPS), change
      # this to "8000:8000" AND set QUANTGLASS_SERVER_AUTH_TOKEN below so the
      # instance requires an access token. Exposing without a token leaves your
      # local data, watchlists, and paper account open to anyone on the network.
      - "127.0.0.1:8000:8000"
    # environment:
    #   QUANTGLASS_SERVER_AUTH_TOKEN: "change-me-to-a-long-random-secret"
    volumes:
      - quantglass-data:/data
    restart: unless-stopped

volumes:
  quantglass-data:
